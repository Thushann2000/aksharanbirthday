<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 Aksharan's Grand 1st Birthday - Floating Memories 🎂</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --baby-pink: #fecdd3;
            --soft-peach: #fed7aa;
            --primary-pink: #ec4899;
            --dark-pink: #be185d;
            --light-purple: #d8b4fe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--baby-pink) 0%, #f9a8d4 50%, var(--soft-peach) 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes screenShake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-1deg); }
            20% { transform: translate(-4px, 0px) rotate(1deg); }
            30% { transform: translate(4px, 3px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 3px) rotate(-1deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            70% { transform: translate(4px, 2px) rotate(-1deg); }
            80% { transform: translate(-2px, -2px) rotate(1deg); }
            90% { transform: translate(2px, 3px) rotate(0deg); }
            100% { transform: translate(2px, -3px) rotate(-1deg); }
        }
        .shake-active {
            animation: screenShake 0.4s infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(30deg); }
        }

        @keyframes pulse-scale {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes bounce-down {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes slide-in-left {
            0% { transform: translateX(-100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes slide-in-right {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes rotate-360 {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.05); }
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(236, 72, 153, 0.3), 0 15px 35px rgba(190, 24, 93, 0.15); }
            50% { box-shadow: 0 0 30px rgba(236, 72, 153, 0.6), 0 20px 50px rgba(190, 24, 93, 0.3); }
        }

        @keyframes flip-in {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        @keyframes zoom-in {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .bg-element {
            position: fixed;
            z-index: -1;
            opacity: 0.3;
            animation: floatAnim 8s infinite ease-in-out;
            pointer-events: none;
        }

        .header-section {
            padding: 40px 15px 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: bounce-down 0.8s ease-out;
        }

        h1 {
            font-family: 'Comic Neue', cursive;
            color: var(--dark-pink);
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15);
            margin-bottom: 10px;
            animation: pulse-scale 2s ease-in-out infinite;
        }

        .creator-badge {
            display: inline-block;
            animation: zoom-in 0.6s ease-out;
        }

        /* ===== SLIDESHOW - DYNAMIC CONTAINER ===== */
        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 30px auto;
            padding: 0 15px;
            z-index: 10;
        }

        .slideshow-wrapper {
            position: relative;
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            background: white;
            padding: 15px;
            border: 5px solid white;
            animation: glow-pulse 3s ease-in-out infinite;
            box-shadow: 0 15px 40px rgba(190, 24, 93, 0.25);
            min-height: 300px;
        }

        .slideshow-inner {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slideshow-item {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slideshow-item.active {
            display: flex;
            opacity: 1;
            animation: flip-in 0.6s ease-out;
        }

        .slideshow-item img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            background: white;
            border-radius: 12px;
        }

        /* Dynamic height adjustment based on image */
        .slideshow-inner.img-portrait {
            aspect-ratio: 3 / 4;
        }

        .slideshow-inner.img-landscape {
            aspect-ratio: 16 / 9;
        }

        .slideshow-inner.img-square {
            aspect-ratio: 1 / 1;
        }

        .slide-label {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.98);
            padding: 10px 25px;
            border-radius: 50px;
            color: var(--dark-pink);
            font-weight: 700;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 2px solid var(--baby-pink);
            animation: slide-in-up 0.5s ease-out;
            white-space: nowrap;
            z-index: 10;
        }

        @keyframes slide-in-up {
            0% { transform: translateX(-50%) translateY(30px); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ===== CONTROLS RESPONSIVE ===== */
        .slideshow-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(12px, 3vw, 25px);
            margin-top: 20px;
            flex-wrap: wrap;
            padding: 0 15px;
        }

        .slide-btn {
            background: linear-gradient(45deg, #ec4899, #db2777);
            color: white;
            border: none;
            border-radius: 50%;
            width: clamp(45px, 10vw, 55px);
            height: clamp(45px, 10vw, 55px);
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(236,72,153,0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            min-width: 45px;
            min-height: 45px;
        }

        .slide-btn:hover {
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 8px 25px rgba(236,72,153,0.6);
        }

        .slide-btn:active {
            transform: scale(0.95);
        }

        .slide-btn.prev {
            animation: slide-in-left 0.6s ease-out;
        }

        .slide-btn.next {
            animation: slide-in-right 0.6s ease-out;
        }

        .slide-indicator {
            display: flex;
            gap: clamp(6px, 2vw, 10px);
            justify-content: center;
            flex-wrap: wrap;
            min-width: 150px;
        }

        .dot {
            width: clamp(10px, 2vw, 14px);
            height: clamp(10px, 2vw, 14px);
            border-radius: 50%;
            background: rgba(190, 24, 93, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            min-width: 10px;
            min-height: 10px;
        }

        .dot:hover {
            background: rgba(190, 24, 93, 0.6);
            transform: scale(1.2);
        }

        .dot.active {
            background: var(--primary-pink);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
            animation: pulse-scale 0.6s ease-out;
        }

        /* ===== SIGNATURE SECTION ===== */
        .signature-section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: clamp(25px, 5vw, 40px);
            max-width: 700px;
            width: 92%;
            margin: 50px auto 60px;
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 10;
            animation: zoom-in 0.8s ease-out 0.3s backwards;
            box-shadow: 0 10px 40px rgba(190, 24, 93, 0.1);
        }

        .signature-section h3 {
            animation: slide-in-left 0.6s ease-out 0.4s backwards;
        }

        #signature-pad {
            border: 4px solid #fff;
            border-radius: 20px;
            background: #fff;
            width: 100%;
            height: clamp(250px, 50vw, 300px);
            touch-action: none;
            box-shadow: 0 5px 20px rgba(190, 24, 93, 0.1);
            display: block;
        }

        .form-control {
            border-radius: 15px;
            border: 2px solid rgba(190, 24, 93, 0.2);
            padding: clamp(10px, 2vw, 12px);
            font-size: clamp(0.9rem, 2vw, 1rem);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.2);
            transform: translateY(-2px);
        }

        .btn-grand {
            background: linear-gradient(45deg, #ec4899, #db2777);
            color: white;
            border-radius: 50px;
            padding: clamp(12px, 3vw, 15px) clamp(20px, 5vw, 40px);
            font-weight: 700;
            border: none;
            box-shadow: 0 10px 25px rgba(236,72,153,0.4);
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            transition: all 0.3s ease;
        }

        .btn-grand:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(236,72,153,0.6);
        }

        .btn-grand:active {
            transform: translateY(-1px);
        }

        .btn-outline-danger {
            border-radius: 50px;
            border: 2px solid #dc3545;
            color: #dc3545;
            font-weight: 700;
            padding: clamp(10px, 2vw, 12px);
            transition: all 0.3s ease;
        }

        .btn-outline-danger:hover {
            background: #dc3545;
            color: white;
            transform: scale(1.05);
        }

        #celebration-cake {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(6rem, 20vw, 12rem);
            z-index: 9999;
            pointer-events: none;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        #celebration-cake.show {
            transform: translate(-50%, -50%) scale(1);
            animation: rotate-360 1s ease-in-out;
        }

        .footer {
            padding: clamp(25px, 5vw, 40px);
            text-align: center;
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--dark-pink);
            position: relative;
            z-index: 10;
            animation: bounce-down 1s ease-out 0.5s backwards;
        }

        /* ===== MOBILE OPTIMIZATIONS ===== */
        @media (max-width: 576px) {
            body {
                padding-bottom: 20px;
            }

            .header-section {
                padding: 30px 10px 20px;
            }

            h1 {
                line-height: 1.2;
            }

            .slideshow-container {
                padding: 0 10px;
                margin: 20px auto;
            }

            .slideshow-wrapper {
                border-radius: 20px;
                padding: 12px;
                border: 4px solid white;
                min-height: 250px;
            }

            .slideshow-controls {
                gap: 10px;
                margin-top: 15px;
            }

            .signature-section {
                border-radius: 25px;
                padding: 20px;
                margin: 40px auto 50px;
                width: 95%;
            }

            .d-flex.gap-2 {
                flex-direction: column;
            }

            .d-flex.gap-2 button {
                width: 100% !important;
            }

            .slide-label {
                bottom: 10px;
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }

        /* ===== TABLET OPTIMIZATIONS ===== */
        @media (min-width: 577px) and (max-width: 992px) {
            .slideshow-container {
                max-width: 550px;
            }

            .slideshow-wrapper {
                min-height: 350px;
            }

            .signature-section {
                padding: 35px;
            }
        }

        /* ===== DESKTOP OPTIMIZATIONS ===== */
        @media (min-width: 993px) {
            .slideshow-wrapper {
                min-height: 400px;
            }

            .slideshow-wrapper:hover {
                animation: glow-pulse 2s ease-in-out infinite;
            }

            .slide-btn:hover {
                animation: rotate-360 0.5s ease-in-out;
            }

            .signature-section {
                margin: 80px auto;
                padding: 40px;
            }
        }

        /* ===== LANDSCAPE MODE ===== */
        @media (max-height: 600px) and (orientation: landscape) {
            .header-section {
                padding: 15px 15px 10px;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 3px;
            }

            .slideshow-container {
                margin: 10px auto;
            }

            .slideshow-wrapper {
                padding: 10px;
                min-height: 280px;
            }

            .slideshow-controls {
                margin-top: 12px;
            }

            .signature-section {
                margin: 20px auto;
                padding: 20px;
            }

            #signature-pad {
                height: 180px;
            }
        }
    </style>
</head>
<body>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
    AOS.init({ duration: 1000, once: true, offset: 50 });

    // ===== SLIDESHOW LOGIC =====
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slideshow-item');
    const totalSlides = slides.length;
    let slideshowInterval;
    const slideshowInner = document.getElementById('slideshow-inner');

    // Create dots for navigation
    const dotsContainer = document.getElementById('dots-container');
    for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(i));
        dotsContainer.appendChild(dot);
    }
    const dots = document.querySelectorAll('.dot');

    function updateFrameAspectRatio() {
        const currentSlideElement = slides[currentSlide];
        const ratio = currentSlideElement.getAttribute('data-ratio');
        
        // Remove all ratio classes
        slideshowInner.classList.remove('img-portrait', 'img-landscape', 'img-square');
        
        // Add the appropriate class based on ratio
        if (ratio === 'portrait') {
            slideshowInner.classList.add('img-portrait');
        } else if (ratio === 'landscape') {
            slideshowInner.classList.add('img-landscape');
        } else if (ratio === 'square') {
            slideshowInner.classList.add('img-square');
        }
    }

    function showSlide(n) {
        slides.forEach(slide => slide.classList.remove('active'));
        dots.forEach(dot => dot.classList.remove('active'));
        
        slides[n].classList.add('active');
        dots[n].classList.add('active');
        
        const label = slides[n].getAttribute('data-label');
        document.getElementById('slide-label').textContent = label;
        
        // Update frame aspect ratio dynamically
        updateFrameAspectRatio();
    }

    function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
        resetAutoSlide();
    }

    function prevSlide() {
        currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
        showSlide(currentSlide);
        resetAutoSlide();
    }

    function goToSlide(n) {
        currentSlide = n;
        showSlide(n);
        resetAutoSlide();
    }

    function startAutoSlide() {
        slideshowInterval = setInterval(nextSlide, 5000);
    }

    function resetAutoSlide() {
        clearInterval(slideshowInterval);
        startAutoSlide();
    }

    document.getElementById('next-btn').addEventListener('click', nextSlide);
    document.getElementById('prev-btn').addEventListener('click', prevSlide);

    // Initialize first slide with correct aspect ratio
    updateFrameAspectRatio();
    startAutoSlide();

    // ===== SIGNATURE PAD LOGIC =====
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { 
        backgroundColor: 'rgb(255,255,255)', 
        penColor: 'rgb(190, 24, 93)',
        minWidth: 2,
        maxWidth: 4
    });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const clearBtn = document.getElementById('clear');
    const clearAction = (e) => {
        e.preventDefault();
        signaturePad.clear();
    };
    clearBtn.addEventListener('click', clearAction);
    clearBtn.addEventListener('touchstart', clearAction);

    const saveBtn = document.getElementById('save');
    const saveAction = async (e) => {
        e.preventDefault();
        if (signaturePad.isEmpty()) { alert("கையெழுத்து போடவும்! 🍼"); return; }
        
        saveBtn.disabled = true;
        saveBtn.innerText = "Saving...";

        document.body.classList.add('shake-active');

        const duration = 3 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

        const randomInRange = (min, max) => Math.random() * (max - min) + min;

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);

            const particleCount = 50 * (timeLeft / duration);
            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);

        const dataURL = signaturePad.toDataURL("image/jpeg", 0.5); 
        const name = document.getElementById('signer-name').value.trim();
        const wish = document.getElementById('wish').value.trim();
        
        try {
            const response = await fetch('/api/signatures', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ signature: dataURL, name, wish })
            });
            
            if (response.ok) {
                const cake = document.getElementById('celebration-cake');
                cake.classList.add('show');
                
                setTimeout(() => {
                    document.body.classList.remove('shake-active');
                    cake.classList.remove('show');
                    alert("வாழ்த்துக்கள் சேமிக்கப்பட்டது! ❤️");
                    location.reload();
                }, 3000);
            }
        } catch (err) {
            document.body.classList.remove('shake-active');
            alert("Error! மீண்டும் முயற்சி செய்யவும்.");
            saveBtn.disabled = false;
            saveBtn.innerText = "Save & Celebrate! 🎈";
        }
    };

    saveBtn.addEventListener('click', saveAction);
    saveBtn.addEventListener('touchstart', (e) => {
        if (!saveBtn.disabled) saveAction(e);
    });
</script>
</body>
</html>
